<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1a2336">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Estructura · Engenharia da Fala</title>
<style>
  :root{
    --bg:#0f172a;--panel:#1e293b;--panel2:#273449;--ink:#e2e8f0;--muted:#94a3b8;
    --accent:#34d399;--accent2:#38bdf8;--ok:#34d399;--bad:#f87171;--warn:#fbbf24;--line:#334155;--es:#5eead4;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{-webkit-text-size-adjust:100%}
  body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    background:linear-gradient(160deg,#0b1220,#0f172a);color:var(--ink);line-height:1.6;overflow-x:hidden}
  header{padding:16px 16px 11px;border-bottom:1px solid var(--line);background:#1a2336;padding-top:max(16px,env(safe-area-inset-top))}
  header h1{margin:0;font-size:18px} header p{margin:3px 0 0;color:var(--muted);font-size:12.5px}
  nav{display:flex;gap:8px;padding:9px 12px;background:#0c1424;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10}
  nav button{flex:1;background:transparent;border:1px solid var(--line);color:var(--muted);padding:12px;border-radius:11px;cursor:pointer;font-size:15px;font-weight:700}
  nav button.active{background:var(--accent);color:#06281c;border-color:var(--accent)}
  main{max-width:720px;margin:0 auto;padding:18px 14px 90px}
  .view{display:none}.view.active{display:block;animation:f .2s}@keyframes f{from{opacity:0}to{opacity:1}}
  h2{font-size:19px;margin:0 0 4px}.sub{color:var(--muted);font-size:14px;margin:0 0 16px}
  .stagehead{font-size:13px;text-transform:uppercase;letter-spacing:1px;color:var(--accent2);font-weight:800;margin:22px 0 8px}
  .topbar{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .topbar .bar{flex:1;height:9px;background:#0c1424;border:1px solid var(--line);border-radius:999px;overflow:hidden}
  .topbar .bar>div{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));width:0;transition:.4s}
  .topbar .pct{font-size:13px;color:var(--muted);min-width:40px;text-align:right}
  .lesson{display:flex;align-items:center;gap:13px;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px 15px;margin:9px 0;cursor:pointer}
  .lesson:active{transform:scale(.99)}.lesson.locked{opacity:.45}
  .lesson .num{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0;background:var(--panel2);border:2px solid var(--line);color:var(--muted)}
  .lesson.done .num{background:var(--ok);border-color:var(--ok);color:#06281c}
  .lesson.avail .num{background:var(--accent2);border-color:var(--accent2);color:#062a3b}
  .lesson .t{font-weight:700;font-size:15px}.lesson .s{font-size:12.5px;color:var(--muted)}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:18px;margin:12px 0}
  .card h3{margin:0 0 8px;font-size:17px;color:var(--accent)}
  .back{background:none;border:none;color:var(--accent2);font-size:15px;cursor:pointer;padding:8px 0;margin-bottom:4px}
  .stepbar{display:flex;gap:5px;margin:8px 0 14px}
  .stepbar div{flex:1;height:6px;border-radius:3px;background:#0c1424;border:1px solid var(--line)}
  .stepbar div.on{background:var(--accent);border-color:var(--accent)}
  .steplabel{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--accent2);font-weight:800;margin-bottom:6px}
  .rule{background:#102a20;border-left:3px solid var(--accent);padding:11px 13px;border-radius:8px;font-size:14px;margin:0 0 14px}
  .rule b{color:var(--accent)}
  .builder{background:#0c1424;border:1px solid var(--line);border-radius:12px;padding:6px 0;margin:10px 0;overflow:hidden}
  .bcol{padding:10px 14px;border-bottom:1px solid #1c2940}.bcol:last-child{border:none}
  .bcol .h{font-size:11.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--accent2);font-weight:800;margin-bottom:5px}
  .brow{display:flex;justify-content:space-between;gap:12px;padding:3px 0}
  .brow .es{color:var(--es);font-weight:600;font-size:15px}
  .brow .pt{color:var(--muted);font-size:12.5px;text-align:right;flex-shrink:0}
  .examples{margin:10px 0}
  .examples .e{padding:6px 0;border-bottom:1px dashed #24344d}.examples .e:last-child{border:none}
  .examples .es{color:var(--es);font-size:15px}.examples .pt{color:var(--muted);font-size:12.5px}
  .ex-box{background:#0c1424;border:1px solid var(--line);border-radius:10px;padding:11px 13px;margin:9px 0;font-size:14px}
  .hl{color:var(--accent2);font-weight:700}
  .q{font-size:16.5px;margin:6px 0 12px}.q b{color:var(--accent2)}
  .opt{display:block;width:100%;text-align:left;background:var(--panel2);border:1px solid var(--line);color:var(--ink);padding:13px 14px;border-radius:11px;margin:7px 0;cursor:pointer;font-size:15.5px}
  .opt.correct{background:#10241c;border-color:var(--ok);color:var(--ok)}
  .opt.wrong{background:#2a1418;border-color:var(--bad);color:var(--bad)}
  input,textarea{width:100%;background:#0c1424;border:2px solid var(--line);color:var(--ink);padding:13px;border-radius:10px;font-size:17px;font-family:inherit}
  input{text-align:center}textarea{min-height:90px;line-height:1.5}
  input:focus,textarea:focus{outline:none;border-color:var(--accent)}
  .btn{display:block;width:100%;background:var(--accent);color:#06281c;border:none;padding:15px;border-radius:12px;font-weight:800;font-size:16px;cursor:pointer;margin-top:13px;touch-action:manipulation}
  .btn:active{transform:scale(.99)}.btn.alt{background:var(--accent2);color:#062a3b}.btn.ghost{background:transparent;border:1px solid var(--line);color:var(--ink)}
  .fb{margin-top:12px;padding:13px;border-radius:11px;font-size:14.5px;display:none}
  .fb.ok{background:#10241c;border:1px solid var(--ok);display:block}.fb.bad{background:#2a1418;border:1px solid var(--bad);display:block}
  .fb .ans{font-size:15.5px;font-weight:800;margin-bottom:3px}.fb .why{margin-top:6px}
  .fb .correct{font-size:18px;color:var(--es);font-weight:800;margin:4px 0}
  .count{font-size:12.5px;color:var(--muted);margin-bottom:8px}
  details{background:#0c1424;border:1px solid var(--line);border-radius:10px;padding:10px 13px;margin:10px 0;font-size:14px}
  summary{cursor:pointer;color:var(--accent2);font-weight:700}
  .done-screen{text-align:center;padding:26px 10px}.done-screen .big{font-size:46px}.done-screen h3{color:var(--ok);font-size:21px;margin:10px 0}
  .method{background:#15243a;border-left:3px solid var(--accent2);padding:10px 14px;border-radius:8px;font-size:13.5px;margin:10px 0}
  footer{text-align:center;color:#475569;font-size:12px;padding:16px}
</style>
</head>
<body>
<header>
  <h1>🧩 Estructura · Engenharia da Fala</h1>
  <p>Entender a estrutura → produzir. Uma cilada por vez.</p>
</header>
<nav>
  <button class="active" data-v="licoes">📚 Lições</button>
  <button data-v="revisar">🔁 Revisar</button>
</nav>
<main>
<section class="view active" id="licoes">
  <div id="home"></div>
  <div id="licao" style="display:none"></div>
</section>
<section class="view" id="revisar">
  <h2>Revisar (produção)</h2>
  <p class="sub">Treino de retrieval: traduza PT→ES as estruturas que você já viu. Errou? Você vê a forma certa para corrigir.</p>
  <div class="card"><div id="rev-host"></div></div>
</section>
</main>
<footer>Método: produção ativa (output) + contraste PT↔ES. Progresso salvo no aparelho.</footer>

<script>
/* ===== HELPERS ===== */
const NORM=s=>s.toLowerCase().trim().replace(/[¿?¡!.,;:"']/g,"").replace(/\s+/g," ");
const STRIP=s=>NORM(s).normalize("NFD").replace(/[̀-ͯ]/g,"");
function matchAns(g,arr){const a=NORM(g),b=STRIP(g);for(const x of arr)if(a===NORM(x))return"exact";for(const x of arr)if(b===STRIP(x))return"loose";return"no";}
const SAVE="esp_estrutura_v1";
let state={done:[]};
try{const s=JSON.parse(localStorage.getItem(SAVE));if(s&&Array.isArray(s.done))state=s;}catch(e){}
function save(){localStorage.setItem(SAVE,JSON.stringify(state));}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
/* feedback que SEMPRE mostra a forma correta ao errar/quase */
function fbHTML(m,ans,why){
  let head;
  if(m==="exact") head=`<div class="ans">✓ ¡Perfecto!</div>`;
  else if(m==="loose") head=`<div class="ans">✓ Quase! Confira a grafia/acento:</div><div class="correct">${ans}</div>`;
  else head=`<div class="ans">❌ A forma correta é:</div><div class="correct">${ans}</div>`;
  return head+(why?`<div class="why">💡 ${why}</div>`:"");
}

/* ===== CONTEÚDO: 7 LIÇÕES (Estágios 0 e 1) ===== */
const LESSONS=[
/* ===================== ESTÁGIO 0 ===================== */
{id:"0.1",stage:"Estágio 0 · Os fios que ligam tudo",title:"As palavrinhas que ligam",goal:"ligar ideias sem o português vazar",
 builder:{rule:"Troque as palavrinhas do PT: <b>e→y · ou→o · mas→pero · com→con · em→en</b>.",
  cols:[
   {h:"começo",cells:[["Estoy","estou"],["Voy","vou"],["Quiero","quero"],["Vivo","moro"]]},
   {h:"ligação (em/com/a)",cells:[["en casa","em casa"],["con mi hija","com minha filha"],["al cine","ao cinema"],["en Florianópolis","em Floripa"]]},
   {h:"conector",cells:[["y","e"],["pero","mas"],["porque","porque"],["o","ou"]]},
   {h:"fim",cells:[["descanso","descanso"],["no tengo tiempo","não tenho tempo"],["me gusta","eu gosto"],["trabajo","trabalho"]]}],
  examples:[["Estoy en casa y descanso.","Estou em casa e descanso."],["Voy al cine con mi hija.","Vou ao cinema com minha filha."],["Quiero salir pero no tengo tiempo.","Quero sair mas não tenho tempo."]],
  note:"Detalhe fino: y vira <b>e</b> antes de som de i- (padre e hijo); o vira <b>u</b> antes de o- (siete u ocho)."},
 contrast:[
  {pt:"café e leite",es:"café y leche",tip:"e → y"},
  {pt:"chá ou café",es:"té o café",tip:"ou → o"},
  {pt:"barato mas bom",es:"barato pero bueno",tip:"mas → pero"},
  {pt:"com minha filha",es:"con mi hija",tip:"com → con"},
  {pt:"em casa",es:"en casa",tip:"em → en"},
  {pt:"pai e filho",es:"padre e hijo",tip:"y vira 'e' antes de som de i-"}],
 recognize:[
  {q:"café ___ leche (e)",opts:["i","y","e"],c:1,why:"e → y (só vira 'e' antes de som de i-)."},
  {q:"padre ___ hijo (e)",opts:["y","e"],c:1,why:"Antes de som de 'i', y vira e: padre e hijo."},
  {q:"barato ___ bueno (mas)",opts:["mas","pero","sino"],c:1,why:"mas → pero."},
  {q:"Estoy ___ casa (em)",opts:["en","em","na"],c:0,why:"em → en."},
  {q:"Voy ___ mi hija (com)",opts:["com","con","co"],c:1,why:"com → con."},
  {q:"¿té ___ café? (ou)",opts:["o","ou","u"],c:0,why:"ou → o."},
  {q:"siete ___ ocho (ou)",opts:["o","u"],c:1,why:"Antes de som de 'o', o vira u: siete u ocho."}],
 produce:[
  {pt:"Quero café e leite.",a:["quiero café y leche"],why:"e → y."},
  {pt:"Estou em casa com minha filha.",a:["estoy en casa con mi hija"],why:"em→en, com→con."},
  {pt:"É barato mas bom.",a:["es barato pero bueno"],why:"mas → pero."},
  {pt:"Chá ou café?",a:["¿té o café?","té o café"],why:"ou → o."},
  {pt:"Moro em Florianópolis com minha filha.",a:["vivo en florianópolis con mi hija"],why:"em→en, com→con."},
  {pt:"Quero sair mas faz frio.",a:["quiero salir pero hace frío","quiero salir pero hace frio"],why:"mas→pero; faz frio→hace frío."}],
 free:{prompt:"Escreva 2 frases dizendo onde você está e o que está fazendo, ligando com y / pero / con / en.",
  models:["Estoy en casa y estoy descansando.","Quiero salir pero hace frío.","Estoy con mi hija en el parque."]}},

{id:"0.2",stage:"Estágio 0 · Os fios que ligam tudo",title:"Onde entra o pronome",goal:"usar me / te / lo / la / se na hora certa",
 builder:{rule:"Verbo conjugado → pronome <b>ANTES</b> (me despierto). Infinitivo e ordem afirmativa → <b>colado</b> (llamarte, ¡llámame!).",
  cols:[
   {h:"pronome",cells:[["me","me"],["te","te"],["lo / la","o / a"],["se","se"]]},
   {h:"+ verbo conjugado (ANTES)",cells:[["me despierto","eu me acordo"],["te llamo","eu te ligo"],["lo veo","eu o vejo"],["se llama","ele(a) se chama"]]},
   {h:"colado (infinitivo/ordem)",cells:[["acostarme","me deitar"],["llamarte","te ligar"],["¡llámame!","me liga!"],["dámelo","me dá isso"]]}],
  examples:[["Me despierto a las siete.","Eu me acordo às sete."],["Voy a acostarme temprano.","Vou me deitar cedo."],["¡Llámame más tarde!","Me liga mais tarde!"]],
  note:"Dois pronomes juntos: <b>me lo das</b>. E 'le + lo' vira <b>se lo</b> (nunca 'le lo')."},
 contrast:[
  {pt:"me desperto / desperto-me",es:"me despierto",tip:"verbo conjugado → pronome ANTES"},
  {pt:"vou te ligar",es:"voy a llamarte",tip:"infinitivo → colado no fim"},
  {pt:"me dá isso",es:"dámelo",tip:"ordem afirmativa → colado: dá+me+lo"},
  {pt:"não me ligue",es:"no me llames",tip:"ordem negativa → ANTES de novo"},
  {pt:"dei o livro a ele",es:"se lo di",tip:"le+lo vira 'se lo'"}],
 recognize:[
  {q:"Eu me acordo às sete.",opts:["despiértome a las siete","me despierto a las siete"],c:1,why:"Verbo conjugado → pronome antes: me despierto."},
  {q:"Vou te ligar amanhã.",opts:["voy a llamarte mañana","voy a te llamar mañana"],c:0,why:"No infinitivo o pronome cola no fim: llamarte."},
  {q:"Me passa o sal! (ordem)",opts:["me pasa la sal","pásame la sal"],c:1,why:"Ordem afirmativa → colado: pásame."},
  {q:"Ela se chama Ana.",opts:["se llama Ana","llámase Ana"],c:0,why:"Conjugado → antes: se llama."},
  {q:"Não me ligue agora.",opts:["no me llames ahora","no llámame ahora"],c:0,why:"Ordem negativa → antes: no me llames."},
  {q:"Eu o vejo todo dia.",opts:["lo veo todos los días","véolo todos los días"],c:0,why:"Conjugado → antes: lo veo."}],
 produce:[
  {pt:"Eu me levanto cedo.",a:["me levanto temprano"],why:"Pronome antes: me levanto."},
  {pt:"Ela se chama Júnia.",a:["se llama júnia","se llama junia"],why:"se llama."},
  {pt:"Vou me deitar.",a:["voy a acostarme","me voy a acostar"],why:"Infinitivo → acostarme."},
  {pt:"Me passa a água.",a:["pásame el agua","pásame la água"],why:"Ordem → pásame."},
  {pt:"Eu te vejo amanhã.",a:["te veo mañana"],why:"Conjugado → antes: te veo."},
  {pt:"Não me liga tão tarde.",a:["no me llames tan tarde"],why:"Ordem negativa → antes: no me llames."}],
 free:{prompt:"Conte sua rotina da manhã com 2-3 verbos reflexivos (me despierto, me ducho, me visto...).",
  models:["Me despierto a las siete y me ducho.","Después me visto y desayuno con mi hija."]}},

{id:"0.3",stage:"Estágio 0 · Os fios que ligam tudo",title:"\"A gente\" e o tratamento",goal:"falar 'nós' e tratar as pessoas certo",
 builder:{rule:"<b>'A gente' = nosotros</b> (verbo de nós). você=<b>tú</b> (informal) · senhor(a)=<b>usted</b> (verbo de ele) · vocês=<b>vosotros</b> (Espanha).",
  cols:[
   {h:"quem (PT)",cells:[["a gente","= nós"],["você","informal"],["o senhor / a senhora","formal"],["vocês","Espanha"]]},
   {h:"em espanhol",cells:[["nosotros","nós"],["tú","você"],["usted","o sr/a"],["vosotros","vocês"]]},
   {h:"verbo",cells:[["vamos / vivimos","vamos/moramos"],["quieres / tienes","quer/tem"],["quiere / tiene","quer/tem (de ele)"],["queréis / tenéis","querem/têm"]]}],
  examples:[["Nosotros vivimos en Florianópolis.","A gente mora em Florianópolis."],["¿Tú quieres café?","Você quer café?"],["¿Usted puede esperar?","O senhor pode esperar?"],["¿Vosotros tenéis tiempo?","Vocês têm tempo?"]],
  note:"⚠️ <b>usted</b> usa o verbo de 'ele/ela' (usted quiere, usted tiene). Cuidado para não dizer 'usted quieres'."},
 contrast:[
  {pt:"a gente vai (= nós)",es:"nosotros vamos",tip:"'a gente' → nosotros + verbo de nós"},
  {pt:"você quer (informal)",es:"tú quieres",tip:"informal → tú"},
  {pt:"o senhor quer (formal)",es:"usted quiere",tip:"formal → usted (verbo de 'ele')"},
  {pt:"vocês querem (Espanha)",es:"vosotros queréis",tip:"vocês → vosotros"}],
 recognize:[
  {q:"A gente mora em Florianópolis.",opts:["la gente vive en Florianópolis","nosotros vivimos en Florianópolis"],c:1,why:"'A gente' (=nós) → nosotros vivimos."},
  {q:"Você quer um café? (a um amigo)",opts:["¿usted quiere un café?","¿tú quieres un café?"],c:1,why:"Informal → tú quieres."},
  {q:"O senhor pode esperar? (formal)",opts:["¿usted puede esperar?","¿usted puedes esperar?"],c:0,why:"usted usa verbo de 'ele': puede."},
  {q:"Vocês têm tempo? (Espanha)",opts:["¿vosotros tenéis tiempo?","¿vosotros tienen tiempo?"],c:0,why:"vosotros → tenéis."},
  {q:"A gente vai sair agora.",opts:["la gente va a salir ahora","nosotros vamos a salir ahora"],c:1,why:"'A gente' → nosotros vamos."},
  {q:"O senhor ___ razão. (ter)",opts:["tiene","tienes"],c:0,why:"usted → verbo de ele: tiene."}],
 produce:[
  {pt:"A gente vai à praia hoje.",a:["nosotros vamos a la playa hoy","vamos a la playa hoy"],why:"'A gente' → nosotros vamos."},
  {pt:"Vocês querem café? (Espanha)",a:["¿vosotros queréis café?","vosotros queréis café","¿queréis café?"],why:"vocês → vosotros queréis."},
  {pt:"O senhor pode me ajudar?",a:["¿usted puede ayudarme?","usted puede ayudarme","¿puede ayudarme?"],why:"Formal → usted puede + ayudarme."},
  {pt:"A gente mora em Florianópolis.",a:["nosotros vivimos en florianópolis","vivimos en florianópolis"],why:"nosotros vivimos."},
  {pt:"Você tem tempo? (amiga)",a:["¿tú tienes tiempo?","tú tienes tiempo","¿tienes tiempo?"],why:"Informal → tú tienes."},
  {pt:"A gente tem que ir.",a:["nosotros tenemos que ir","tenemos que ir"],why:"nosotros tenemos que."}],
 free:{prompt:"Apresente sua família usando 'nosotros' (a gente): onde moram e o que fazem.",
  models:["Nosotros vivimos en Florianópolis.","Somos tres y nos gusta viajar."]}},

/* ===================== ESTÁGIO 1 ===================== */
{id:"1.1",stage:"Estágio 1 · Falar de você e da rotina",title:"Estados: ser, estar e as ciladas",goal:"descrever estados, sensações e existência",
 builder:{rule:"Sensação→<b>tener</b> (tengo hambre) · clima→<b>hacer</b> (hace frío) · existir→<b>hay</b> · estado→<b>estar</b> · identidade→<b>ser</b>.",
  cols:[
   {h:"ser — quem você é",cells:[["Soy madre","Sou mãe"],["Soy brasileña","Sou brasileira"]]},
   {h:"estar — estado/lugar",cells:[["Estoy cansada","Estou cansada"],["Estoy en casa","Estou em casa"]]},
   {h:"tener — sensação/idade",cells:[["Tengo hambre","Estou com fome"],["Tengo frío","Estou com frio"],["Tengo sueño","Estou com sono"],["Tengo 40 años","Tenho 40 anos"],["Tengo prisa","Estou com pressa"]]},
   {h:"hacer — clima",cells:[["Hace frío","Faz frio"],["Hace calor","Faz calor"],["Hace sol","Faz sol"]]},
   {h:"hay — existe",cells:[["Hay una farmacia","Tem uma farmácia"],["Hay mucha gente","Tem muita gente"]]}],
  examples:[["Soy madre y estoy cansada.","Sou mãe e estou cansada."],["Tengo hambre y hace frío.","Estou com fome e faz frio."],["¿Hay una farmacia cerca?","Tem uma farmácia perto?"]],
  note:"⭐ As 3 ciladas: <b>estou com fome</b> = tengo hambre · <b>faz frio</b> = hace frío · <b>tem pão?</b> = ¿hay pan?"},
 contrast:[
  {pt:"estou com fome",es:"tengo hambre",tip:"sensação → tener (não 'estoy con hambre')"},
  {pt:"tenho 40 anos",es:"tengo 40 años",tip:"idade → tener"},
  {pt:"faz frio hoje",es:"hace frío hoy",tip:"clima → hacer (não 'está frío')"},
  {pt:"tem pão? (existe)",es:"¿hay pan?",tip:"'ter' existencial → hay (não 'tiene')"},
  {pt:"o banheiro está ao fundo",es:"el baño está al fondo",tip:"lugar de algo definido → estar"},
  {pt:"estou com sono",es:"tengo sueño",tip:"sensação → tener"}],
 recognize:[
  {q:"Estou com sono.",opts:["estoy con sueño","tengo sueño"],c:1,why:"Sensação → tener: tengo sueño."},

/* ===== NAV ===== */
document.querySelectorAll("nav button").forEach(b=>b.onclick=()=>{
  document.querySelectorAll("nav button").forEach(x=>x.classList.remove("active"));
  document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));
  b.classList.add("active");document.getElementById(b.dataset.v).classList.add("active");window.scrollTo(0,0);
  if(b.dataset.v==="licoes")renderHome();
  if(b.dataset.v==="revisar")startReview();
});

/* ===== HOME ===== */
function isUnlocked(i){return i===0||state.done.includes(LESSONS[i-1].id);}
function renderHome(){
  document.getElementById("licao").style.display="none";
  const host=document.getElementById("home");host.style.display="block";
  const pct=Math.round(state.done.length/LESSONS.length*100);
  let h=`<div class="method">🎯 <b>Cada lição:</b> 1) ver o padrão → 2) contraste PT↔ES → 3) reconhecer → 4) produzir com cola → 5) produzir livre. Errou? Você vê a forma certa para corrigir.</div>
   <div class="topbar"><div class="bar"><div style="width:${pct}%"></div></div><span class="pct">${pct}%</span></div>`;
  let cur="";
  LESSONS.forEach((l,i)=>{
    if(l.stage!==cur){cur=l.stage;h+=`<div class="stagehead">${l.stage}</div>`;}
    const done=state.done.includes(l.id),un=isUnlocked(i);
    const cls=done?"done":(un?"avail":"locked");const icon=done?"✓":(un?"▶":"🔒");
    h+=`<div class="lesson ${cls}" data-i="${i}"><div class="num">${icon}</div>
      <div><div class="t">${l.title}</div><div class="s">para ${l.goal}</div></div></div>`;
  });
  host.innerHTML=h;
  host.querySelectorAll(".lesson").forEach(el=>{const i=+el.dataset.i;if(isUnlocked(i))el.onclick=()=>openLesson(i);});
}

/* ===== render helpers ===== */
function builderHTML(b,compact){
  let h=`<div class="builder">`;
  b.cols.forEach(c=>{
    h+=`<div class="bcol"><div class="h">${c.h}</div>`;
    c.cells.forEach(cell=>h+=`<div class="brow"><span class="es">${cell[0]}</span><span class="pt">${cell[1]}</span></div>`);
    h+=`</div>`;
  });
  h+=`</div>`;
  return h;
}

/* ===== LIÇÃO: 5 passos ===== */
const STEP_NAMES=["Ver o padrão","Contraste","Reconhecer","Produzir com cola","Produzir livre"];
function openLesson(i){
  const l=LESSONS[i];let step=0;window.scrollTo(0,0);
  document.getElementById("home").style.display="none";
  const host=document.getElementById("licao");host.style.display="block";
  function frame(inner){
    const bars=STEP_NAMES.map((_,k)=>`<div class="${k<=step?'on':''}"></div>`).join("");
    return `<button class="back" onclick="renderHome()">← Lições</button>
      <div class="count">${l.title}</div><div class="stepbar">${bars}</div>
      <div class="steplabel">Passo ${step+1}/5 · ${STEP_NAMES[step]}</div><div class="card">${inner}</div>`;
  }
  function go(n){step=n;render();window.scrollTo(0,0);}
  window.__go=go;
  function render(){[renderModel,renderContrast,renderRecognize,renderProduce,renderFree][step]();}

  function renderModel(){
    const b=l.builder;
    let ex=`<div class="examples">`+b.examples.map(e=>`<div class="e"><div class="es">✅ ${e[0]}</div><div class="pt">${e[1]}</div></div>`).join("")+`</div>`;
    host.innerHTML=frame(`<h3>${l.title}</h3><div class="rule">📌 <b>Regra de ouro:</b> ${b.rule}</div>
      ${builderHTML(b)}${ex}<div class="ex-box">💡 ${b.note}</div>
      <button class="btn" onclick="__go(1)">Entendi o padrão →</button>`);
  }
  function renderContrast(){
    let rows=l.contrast.map(c=>`<div class="ex-box"><div><span style="color:var(--bad)">🇧🇷 ${c.pt}</span> &nbsp;→&nbsp; <span style="color:var(--es);font-weight:700">🇪🇸 ${c.es}</span></div><div style="color:var(--muted);font-size:12.5px;margin-top:3px">↳ ${c.tip}</div></div>`).join("");
    host.innerHTML=frame(`<h3>O que muda do português</h3>${rows}<button class="btn" onclick="__go(2)">Agora vou treinar →</button>`);
  }
  function renderRecognize(){
    let qi=0,answered=false;
    function rq(){
      answered=false;const d=l.recognize[qi];
      let opts=d.opts.map((o,k)=>`<button class="opt" data-k="${k}">${o}</button>`).join("");
      host.innerHTML=frame(`<div class="count">Reconhecer · ${qi+1}/${l.recognize.length}</div>
        <div class="q">${d.q}</div>${opts}<div class="fb" id="rfb"></div>
        <button class="btn" id="rnext" style="display:none">Próximo →</button>`);
      host.querySelectorAll(".opt").forEach(btn=>btn.onclick=()=>{
        if(answered)return;answered=true;const k=+btn.dataset.k;const fb=document.getElementById("rfb");
        host.querySelectorAll(".opt").forEach((x,xi)=>{if(xi===d.c)x.classList.add("correct");else if(xi===k)x.classList.add("wrong");});
        const ok=k===d.c;
        fb.className="fb "+(ok?"ok":"bad");
        fb.innerHTML=`<div class="ans">${ok?"✓ Isso!":"❌ A forma correta é:"}</div>${ok?"":`<div class="correct">${d.opts[d.c]}</div>`}<div class="why">💡 ${d.why}</div>`;
        const nb=document.getElementById("rnext");nb.style.display="block";nb.textContent=(qi+1<l.recognize.length)?"Próximo →":"Ir produzir →";
        nb.onclick=()=>{qi++;if(qi<l.recognize.length)rq();else go(3);};
      });
    }
    rq();
  }
  function renderProduce(){
    let qi=0,answered=false;
    function pq(){
      answered=false;const d=l.produce[qi];
      host.innerHTML=frame(`<div class="count">Produzir · ${qi+1}/${l.produce.length}</div>
        <div class="q">Traduza: <b>${d.pt}</b></div>
        <input id="pin" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="escreva em espanhol…">
        <button class="btn" id="pck">Verificar</button>
        <details><summary>👀 ver a cola (tabela)</summary>${builderHTML(l.builder)}</details>
        <div class="fb" id="pfb"></div>
        <button class="btn alt" id="pnext" style="display:none">Próximo →</button>`);
      const inp=document.getElementById("pin"),ck=document.getElementById("pck"),fb=document.getElementById("pfb"),nx=document.getElementById("pnext");
      inp.focus();
      ck.onclick=()=>{
        if(answered)return;if(!inp.value.trim())return;answered=true;inp.disabled=true;ck.style.display="none";
        const m=matchAns(inp.value,d.a);
        fb.className="fb "+(m==="no"?"bad":"ok");
        fb.innerHTML=fbHTML(m,d.a[0],d.why);
        nx.style.display="block";nx.textContent=(qi+1<l.produce.length)?"Próximo →":"Última etapa →";
        nx.onclick=()=>{qi++;if(qi<l.produce.length)pq();else go(4);};
      };
      inp.addEventListener("keydown",e=>{if(e.key==="Enter")ck.click();});
    }
    pq();
  }
  function renderFree(){
    host.innerHTML=frame(`<h3>Produza livre 🗣️</h3><p style="font-size:15px">${l.free.prompt}</p>
      <textarea id="fin" placeholder="escreva (ou fale em voz alta) suas frases…"></textarea>
      <button class="btn alt" id="fsee">Ver frases-modelo</button>
      <div class="fb" id="ffb"></div>
      <button class="btn" id="fdone" style="display:none">✓ Concluir lição</button>`);
    document.getElementById("fsee").onclick=()=>{
      const fb=document.getElementById("ffb");fb.className="fb ok";
      fb.innerHTML=`<div class="ans">Modelos para comparar:</div>`+l.free.models.map(m=>`<div class="correct" style="font-size:15px">✅ ${m}</div>`).join("");
      document.getElementById("fdone").style.display="block";
    };
    document.getElementById("fdone").onclick=()=>{
      if(!state.done.includes(l.id)){state.done.push(l.id);save();}
      const next=i+1<LESSONS.length?i+1:null;
      host.innerHTML=`<div class="card done-screen"><div class="big">🎉</div><h3>Lição concluída!</h3>
        <p class="sub">Você entendeu a estrutura e produziu. Isso volta na aba Revisar.</p>
        ${next!==null?`<button class="btn" id="gn">Próxima lição →</button>`:`<p class="sub">Você terminou os Estágios 0 e 1! 🥳</p>`}
        <button class="btn ghost" onclick="renderHome()">Voltar às lições</button></div>`;
      if(next!==null)document.getElementById("gn").onclick=()=>openLesson(next);
    };
  }
  render();
}
window.renderHome=renderHome;window.openLesson=openLesson;

/* ===== REVISAR ===== */
function startReview(){
  const host=document.getElementById("rev-host");
  const doneL=LESSONS.filter(l=>state.done.includes(l.id));
  if(!doneL.length){host.innerHTML=`<p class="sub">Conclua ao menos uma lição para liberar a revisão.</p>`;return;}
  let pool=[];doneL.forEach(l=>l.produce.forEach(p=>pool.push(p)));
  pool=shuffle(pool);let qi=0,answered=false;
  function rq(){
    answered=false;const d=pool[qi];
    host.innerHTML=`<div class="count">Revisão · ${qi+1}/${pool.length}</div>
      <div class="q">Traduza: <b>${d.pt}</b></div>
      <input id="rin" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="escreva em espanhol…">
      <button class="btn" id="rck">Verificar</button><div class="fb" id="rfb2"></div>
      <button class="btn alt" id="rnx" style="display:none">Próximo →</button>`;
    const inp=document.getElementById("rin"),ck=document.getElementById("rck"),fb=document.getElementById("rfb2"),nx=document.getElementById("rnx");
    inp.focus();
    ck.onclick=()=>{
      if(answered)return;if(!inp.value.trim())return;answered=true;inp.disabled=true;ck.style.display="none";
      const m=matchAns(inp.value,d.a);fb.className="fb "+(m==="no"?"bad":"ok");fb.innerHTML=fbHTML(m,d.a[0],d.why);
      nx.style.display="block";nx.textContent=(qi+1<pool.length)?"Próximo →":"Concluir";
      nx.onclick=()=>{qi++;if(qi<pool.length)rq();else host.innerHTML=`<div class="done-screen"><div class="big">🔁</div><h3>Revisão concluída!</h3><button class="btn" onclick="startReview()">Recomeçar</button></div>`;};
    };
    inp.addEventListener("keydown",e=>{if(e.key==="Enter")ck.click();});
  }
  rq();
}

renderHome();
</script>
